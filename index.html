<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #borderimg {
            border: 10px solid transparent;
            padding: 15px;
            border-image: url(border.png) 30 round;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgb(160, 158, 187);
        }

        head {
            background-color: rgb(160, 158, 187);
        }

        h1 {
            border: 10px ridge rgb(191, 255, 188);
            border: ridge;
            padding: 200px 200px 200px 200px;
            margin: auto;
            background-color: rgb(178, 184, 201);
        }

        article {
            border: 200px 200px;
            background-color: rgb(160, 158, 187);
        }

        nav ul {
            display: flex;
            justify-content: space-evenly;
            list-style-type: none;
            padding: 0;
        }

        nav ul li {
            margin: 10px 20px 10px 20px;
            background-color: rgb(141, 158, 198);
            padding: 10px;
            border: 5px ridge rgb(191, 255, 188);
            border-radius: 10px;
            transition: 0.6s;
            text-shadow: 2px 2px 5px;
        }

        nav ul li:hover {
            background-color: rgb(168, 174, 193);
            text-shadow: 2px 2px 5px;
            margin: 0;
            padding: 20px 30px 20px 30px;
            transition: 0.6s;
        }



        article {
            background-color: rgb(168, 174, 193);
            width: 75%;
            border-width: 5px;
            border-style: ridge;
            border-color: rgb(191, 255, 188);
            border-radius: 10px;
            padding: 10px;
        }

        #grad1 {
            height: 100px;
            background-color: rgb(178, 184, 201);
            background-image: linear-gradient(to bottom right, rgb(178, 184, 201), rgb(191, 255, 188));
        }
    </style>
</head>


<body>
    <h1 id="borderimg">Page Top Header</h1>
    <div id="grad1"></div>
    <nav>
        <ul>
            <li><a href="#">Link</a></li>
            <li><a href="#">Link</a></li>
            <li><a href="#">Link</a></li>
            <li><a href="#">Link</a></li>
            <li><a href="#">Link</a></li>
        </ul>
    </nav>
    <article>
        <h2>Article Title</h2>

    </article>
    <footer>
        &copy; 2026
    </footer>
</body>

</html>
